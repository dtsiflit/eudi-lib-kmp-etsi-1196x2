name: XCFramework SwiftPM Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.2.3"
        required: true

jobs:
  release:
    runs-on: macos-14

    permissions:
      contents: write

    env:
      INPUT_VERSION: ${{ github.event.inputs.version }}
      GRADLE_PROJECT: etsi-119602-consultation
      OUTPUT_DIR: 119602-consultation/build/XCFrameworks/release
      FRAMEWORK_NAME: EudiEtsi1196x2
      PACKAGE_NAME: EudiEtsi1196x2
      ZIP_NAME: EudiEtsi1196x2.xcframework.zip

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build XCFramework
        run: ./gradlew :${GRADLE_PROJECT}:assemble${FRAMEWORK_NAME}ReleaseXCFramework

      - name: Zip XCFramework
        run: |
          cd "${OUTPUT_DIR}"
          rm -f "${ZIP_NAME}"
          ditto -c -k --sequesterRsrc --keepParent \
            "${FRAMEWORK_NAME}.xcframework" \
            "${ZIP_NAME}"

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum "${OUTPUT_DIR}/${ZIP_NAME}")
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $CHECKSUM"

      - name: Generate Package.swift
        run: |
          cat > Package.swift <<EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "${PACKAGE_NAME}",
              platforms: [
                  .iOS(.v14)
              ],
              products: [
                  .library(
                      name: "${PACKAGE_NAME}",
                      targets: ["${FRAMEWORK_NAME}"]
                  )
              ],
              targets: [
                  .binaryTarget(
                      name: "${FRAMEWORK_NAME}",
                      url: "https://github.com/${{ github.repository }}/releases/download/${INPUT_VERSION}/${ZIP_NAME}",
                      checksum: "${{ steps.checksum.outputs.checksum }}"
                  )
              ]
          )
          EOF

          cat Package.swift

      - name: Commit Package.swift to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Package.swift

          if git diff --cached --quiet; then
            echo "No Package.swift changes to commit."
          else
            git commit -m "Release ${INPUT_VERSION}"
            git push origin main
          fi

      - name: Create and push tag
        run: |
          git fetch --tags

          if git rev-parse "${INPUT_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${INPUT_VERSION} already exists."
          else
            git tag "${INPUT_VERSION}"
            git push origin "${INPUT_VERSION}"
          fi

      - name: Create GitHub release and upload XCFramework
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.INPUT_VERSION }}
          name: ${{ env.INPUT_VERSION }}
          files: ${{ env.OUTPUT_DIR }}/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload XCFramework zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.OUTPUT_DIR }}/${{ env.ZIP_NAME }}
